name: Sync Git Mirrors

on:
  workflow_dispatch:
  repository_dispatch:
    types: [gitea-sync]
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-mirrors:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Debug - Show secrets (masked)
      run: |
        echo "GITEA_USER is set: ${{ secrets.GITEA_USER != '' }}"
        echo "CODEBERG_USER is set: ${{ secrets.CODEBERG_USER != '' }}"
    
    - name: Add Gitea remote
      run: |
        git remote add gitea https://${{ secrets.GITEA_USER }}:${{ secrets.GITEA_TOKEN }}@gitea.com/blackdorvelus-star/lyss.git
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "github-actions@github.com"
        git fetch gitea --verbose 2>&1 | head -20
    
    - name: Add Codeberg remote
      run: |
        git remote add codeberg https://${{ secrets.CODEBERG_USER }}:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/blackdorvelus-star/lyss.git
        git fetch codeberg --verbose 2>&1 | head -20
    
    - name: Sync from Gitea to GitHub
      run: |
        echo "Pulling from Gitea..."
        git pull gitea main --no-rebase --allow-unrelated-histories || echo "No changes from Gitea"
        echo "Pushing to GitHub..."
        git push origin main
        
    - name: Sync from GitHub to Codeberg
      run: |
        echo "Pushing to Codeberg..."
        git push codeberg main || echo "Codeberg push failed"
        
    - name: Cleanup
      run: |
        git remote remove gitea || true
        git remote remove codeberg || true
        echo "Workflow completed"