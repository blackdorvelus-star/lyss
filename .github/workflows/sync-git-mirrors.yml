name: Sync Git Mirrors

on:
  workflow_dispatch:
  repository_dispatch:
    types: [gitea-sync]
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
      - master

jobs:
  sync-mirrors:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Add Gitea remote
      run: |
        git remote add gitea https://${{ secrets.GITEA_USER }}:${{ secrets.GITEA_TOKEN }}@gitea.com/blackdorvelus-star/lyss.git
        git fetch gitea
    
    - name: Add Codeberg remote
      run: |
        git remote add codeberg https://${{ secrets.CODEBERG_USER }}:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/blackdorvelus-star/lyss.git
        git fetch codeberg
    
    - name: Sync from Gitea to GitHub
      run: |
        git pull gitea main --no-rebase --allow-unrelated-histories || true
        git push origin main
        
    - name: Sync from GitHub to Codeberg
      run: |
        git push codeberg main
        
    - name: Cleanup
      run: |
        git remote remove gitea
        git remote remove codeberg