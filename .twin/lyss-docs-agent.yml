# Agent Twin.so pour Lyss - Documentation Automatique
# Version: 1.0
# Date: 2026-03-31

agent:
  name: "lyss-docs-agent"
  description: "Génère et maintient la documentation du projet Lyss automatiquement"
  version: "1.0.0"
  
  # Configuration du modèle
  model:
    provider: "openai"
    model: "gpt-4-turbo"
    temperature: 0.3
    max_tokens: 4000
    
  # Triggers
  triggers:
    - name: "github_webhook"
      description: "Déclenché sur push vers le dépôt Lyss"
      conditions:
        - repository: "blackdorvelus-star/lyss"
        - branch: "main"
        - event: "push"
        
    - name: "schedule_daily"
      description: "Exécution quotidienne à minuit"
      schedule: "0 0 * * *"
      
    - name: "manual_request"
      description: "Déclenché manuellement via interface"
      
  # Actions
  actions:
    - name: "analyze_project_structure"
      description: "Analyse la structure du projet Lyss"
      steps:
        - scan_directory: "/"
        - identify_file_types: [".js", ".ts", ".vue", ".md", ".json", ".yml", ".yaml"]
        - extract_comments_and_docstrings: true
        
    - name: "generate_documentation"
      description: "Génère la documentation Markdown"
      steps:
        - generate_readme: true
        - generate_api_docs: true
        - generate_setup_guide: true
        - generate_examples: true
        
    - name: "update_files"
      description: "Met à jour les fichiers de documentation"
      steps:
        - update_readme: "README.md"
        - create_api_docs: "docs/api.md"
        - create_setup_guide: "docs/setup.md"
        - create_examples: "docs/examples.md"
        
    - name: "commit_changes"
      description: "Commit et push les changements"
      steps:
        - stage_files: ["README.md", "docs/*"]
        - commit_message: "docs: mise à jour automatique de la documentation"
        - push_to: "main"
        
  # Règles de traitement
  rules:
    - name: "ignore_node_modules"
      pattern: "node_modules/**"
      action: "skip"
      
    - name: "ignore_build_artifacts"
      pattern: ["dist/**", "build/**", ".next/**"]
      action: "skip"
      
    - name: "process_source_files"
      pattern: ["src/**/*.js", "src/**/*.ts", "src/**/*.vue"]
      action: "analyze"
      
    - name: "process_config_files"
      pattern: ["*.json", "*.yml", "*.yaml", "*.config.*"]
      action: "analyze"
      
  # Templates de documentation
  templates:
    readme:
      sections:
        - "Project Overview"
        - "Features"
        - "Installation"
        - "Usage"
        - "API Reference"
        - "Contributing"
        - "License"
        
    api_docs:
      sections:
        - "Endpoints"
        - "Request/Response Examples"
        - "Authentication"
        - "Error Codes"
        
    setup_guide:
      sections:
        - "Prerequisites"
        - "Installation Steps"
        - "Configuration"
        - "Development Setup"
        - "Production Deployment"
        
  # Paramètres de qualité
  quality:
    min_doc_coverage: 80%
    require_examples: true
    validate_links: true
    check_spelling: true
    
  # Notifications
  notifications:
    - channel: "github"
      on_success: true
      on_failure: true
      
    - channel: "email"
      on_failure: true
      
  # Métriques
  metrics:
    track:
      - files_analyzed
      - documentation_generated
      - coverage_percentage
      - execution_time
      
  # Planification
  schedule:
    daily_analysis: "0 2 * * *"  # 2h du matin
    weekly_report: "0 9 * * 1"   # Lundi 9h
    monthly_cleanup: "0 3 1 * *" # 1er du mois 3h