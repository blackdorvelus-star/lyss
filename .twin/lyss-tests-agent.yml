# Agent Twin.so pour Lyss - Tests Automatiques
# Version: 1.0
# Date: 2026-03-31

agent:
  name: "lyss-tests-agent"
  description: "Exécute les tests et génère des rapports pour le projet Lyss"
  version: "1.0.0"
  
  # Configuration du modèle
  model:
    provider: "openai"
    model: "gpt-4-turbo"
    temperature: 0.2
    max_tokens: 3000
    
  # Triggers
  triggers:
    - name: "pre_merge"
      description: "Avant chaque merge sur main"
      conditions:
        - repository: "blackdorvelus-star/lyss"
        - branch: ["feature/*", "bugfix/*", "hotfix/*"]
        - event: "pull_request"
        
    - name: "nightly_tests"
      description: "Exécution toutes les nuits"
      schedule: "0 3 * * *"  # 3h du matin
      
    - name: "on_demand"
      description: "Sur demande manuelle"
      
    - name: "on_code_change"
      description: "Quand du code est modifié"
      conditions:
        - files_changed: ["src/**/*.js", "src/**/*.ts", "src/**/*.vue"]
        
  # Actions
  actions:
    - name: "run_unit_tests"
      description: "Exécute les tests unitaires"
      steps:
        - command: "npm test"
        - command: "npm run test:unit"
        - timeout: 300  # 5 minutes
        
    - name: "run_integration_tests"
      description: "Exécute les tests d'intégration"
      steps:
        - command: "npm run test:integration"
        - timeout: 600  # 10 minutes
        
    - name: "run_e2e_tests"
      description: "Exécute les tests end-to-end"
      steps:
        - command: "npm run test:e2e"
        - timeout: 900  # 15 minutes
        
    - name: "generate_coverage_report"
      description: "Génère le rapport de couverture"
      steps:
        - command: "npm run test:coverage"
        - generate_report: "coverage/lcov-report/index.html"
        - upload_artifact: "coverage-report"
        
    - name: "analyze_test_results"
      description: "Analyse les résultats des tests"
      steps:
        - parse_test_results: true
        - identify_failing_tests: true
        - suggest_fixes: true
        - generate_summary: true
        
    - name: "notify_results"
      description: "Notifie les résultats"
      steps:
        - send_slack_notification: true
        - update_pr_status: true
        - create_github_issue_on_failure: true
        
  # Configuration des tests
  test_config:
    unit_tests:
      framework: "vitest"
      pattern: "**/*.test.{js,ts,vue}"
      timeout: 5000
      
    integration_tests:
      framework: "vitest"
      pattern: "**/*.spec.{js,ts,vue}"
      timeout: 10000
      
    e2e_tests:
      framework: "playwright"
      pattern: "**/*.e2e.{js,ts}"
      timeout: 30000
      
  # Seuils de qualité
  quality_thresholds:
    unit_test_coverage: 80%
    integration_test_coverage: 70%
    e2e_test_coverage: 50%
    max_failing_tests: 0
    max_skipped_tests: 5
    
  # Règles d'analyse
  analysis_rules:
    - name: "prioritize_failing_tests"
      condition: "test_failed"
      priority: "high"
      action: "notify_immediately"
      
    - name: "flaky_test_detection"
      condition: "test_intermittent_failure"
      priority: "medium"
      action: "flag_for_review"
      
    - name: "slow_test_optimization"
      condition: "test_duration > 1000ms"
      priority: "low"
      action: "suggest_optimization"
      
  # Rapports
  reports:
    daily_summary:
      schedule: "0 9 * * *"  # 9h du matin
      include:
        - test_results
        - coverage_trends
        - flaky_tests
        - performance_metrics
        
    weekly_detailed:
      schedule: "0 10 * * 1"  # Lundi 10h
      include:
        - detailed_analysis
        - comparison_with_previous
        - recommendations
        - action_items
        
  # Intégrations
  integrations:
    github:
      status_checks: true
      comment_on_pr: true
      require_passing_tests: true
      
    slack:
      channel: "#lyss-tests"
      notify_on_failure: true
      daily_summary: true
      
    email:
      recipients: ["team@lyss.com"]
      weekly_report: true
      critical_failures: true
      
  # Métriques de performance
  performance_metrics:
    track:
      - test_execution_time
      - test_success_rate
      - coverage_trend
      - flaky_test_count
      - build_duration
      
  # Maintenance
  maintenance:
    cleanup_old_reports: "30d"
    archive_test_logs: "90d"
    optimize_test_suite: "weekly"
    
  # Plan d'amélioration continue
  improvement_plan:
    - goal: "Augmenter la couverture à 90%"
      timeframe: "30d"
      actions:
        - "Ajouter des tests pour les composants critiques"
        - "Implémenter des tests de snapshot"
        
    - goal: "Réduire le temps d'exécution des tests"
      timeframe: "60d"
      actions:
        - "Paralléliser les tests"
        - "Optimiser les tests lents"
        - "Utiliser le mocking efficacement"